apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: day-0
  namespace: argocd
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    path: workloads
    repoURL: https://github.com/ikaliuzh/aire-agents.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
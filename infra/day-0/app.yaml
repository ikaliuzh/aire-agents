apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: day-0
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    path: infra/day-0/apps
    repoURL: https://github.com/ikaliuzh/aire-agents.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
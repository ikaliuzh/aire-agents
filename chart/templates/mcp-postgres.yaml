{{- if .Values.mcpServers.postgres.enabled }}
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: {{ .Values.mcpServers.postgres.name }}
  namespace: {{ .Values.mcpServers.postgres.namespace }}
  labels:
    app.kubernetes.io/name: postgres-mcp-server
    app.kubernetes.io/part-of: aire
spec:
  transportType: http
  timeout: "30s"

  deployment:
    image: {{ .Values.mcpServers.postgres.image.repository }}:{{ .Values.mcpServers.postgres.image.tag }}
    imagePullPolicy: {{ .Values.mcpServers.postgres.image.pullPolicy }}
    port: 8080

    # Use shell wrapper to construct DATABASE_URI from mounted secrets
    cmd: "/wrapper/entrypoint.sh"
    args:
    - --access-mode={{ .Values.mcpServers.postgres.accessMode }}

    # Mount wrapper script and postgres credentials
    volumeMounts:
    - name: wrapper-script
      mountPath: /wrapper
      readOnly: true
    - name: postgres-secret
      mountPath: /secrets/postgres
      readOnly: true

    volumes:
    - name: wrapper-script
      configMap:
        name: {{ .Values.mcpServers.postgres.name }}-wrapper
        defaultMode: 0755
    - name: postgres-secret
      secret:
        secretName: {{ .Values.mcpServers.postgres.connection.passwordSecret }}

    resources:
      {{- toYaml .Values.mcpServers.postgres.resources | nindent 6 }}

  httpTransport:
    targetPort: 8080
    path: /
{{- end }}

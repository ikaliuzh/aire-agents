apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.agentgateway.proxy.name }}
  namespace: {{ .Values.agentgateway.namespace }}
spec:
  gatewayClassName: {{ .Values.agentgateway.proxy.className }}
  listeners:
  - protocol: HTTP
    port: 80
    name: http
    allowedRoutes:
      namespaces:
        from: All

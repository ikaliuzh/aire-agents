{{- if .Values.agentgateway.backends.gemini.enabled }}
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: gemini
  namespace: {{ .Values.agentgateway.namespace }}
spec:
  ai:
    provider:
      gemini:
        model: {{ .Values.agentgateway.backends.gemini.model }}
  policies:
    auth:
      secretRef:
        name: {{ .Values.agentgateway.backends.gemini.secretName }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gemini
  namespace: {{ .Values.agentgateway.namespace }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.agentgateway.proxy.name }}
      namespace: {{ .Values.agentgateway.namespace }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: {{ .Values.agentgateway.backends.gemini.route.path }}
    backendRefs:
    - name: gemini
      namespace: {{ .Values.agentgateway.namespace }}
      group: agentgateway.dev
      kind: AgentgatewayBackend
      weight: 1
{{- end }}

apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: aire-model-config
  namespace: kagent
spec:
  model: {{ .Values.agentgateway.backends.gemini.model }}
  provider: OpenAI
  openAI:
    # AgentGateway handles authentication - no API key needed here
    baseUrl: http://{{ .Values.agentgateway.proxy.name }}.{{ .Values.agentgateway.namespace }}.svc.cluster.local{{ .Values.agentgateway.backends.gemini.route.path }}
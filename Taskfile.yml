# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

dotenv: ['.env']

includes:
  agent:
    taskfile: ./agents/adk-root/Taskfile.yml
    dir: ./agents/adk-root

tasks:
  up:
    desc: |
      Bootstrap fresh lab environment
    deps:
      - kind-create
    cmds:
      - task: install-argo
      - task: create-namespaces
      - task: apply-secrets
      - task: deploy-day-0


  down:
    desc: |
      Tear-down the lab environment
    deps:
      - kind-destroy

  kind-create:
    desc: |
      Create a kind cluster with context aire-lab
    cmd: kind create cluster --name aire-lab --config infra/kind/config.yaml
    status:
      - kind get clusters | grep -qx aire-lab

  kind-destroy:
    desc: |
      Prune the lab kind cluster - needed for fresh installation
    cmd: kind delete cluster --name aire-lab


  install-argo:
    desc: |
      Install argo cd chart onto the cluster; has to be done as part of bootstrap
    cmds:
      - kubectl create namespace argocd --context kind-aire-lab
      - kubectl apply -n argocd --server-side --force-conflicts -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml --context kind-aire-lab
    status:
      - kubectl get namespace argocd

  create-namespaces:
    desc: |
      Create namespaces required for workloads
    cmds:
      - kubectl create namespace agentgateway-system --context kind-aire-lab --dry-run=client -o yaml | kubectl apply -f - --context kind-aire-lab
      - kubectl create namespace kagent --context kind-aire-lab --dry-run=client -o yaml | kubectl apply -f - --context kind-aire-lab
      - kubectl create namespace cnpg-system --context kind-aire-lab --dry-run=client -o yaml | kubectl apply -f - --context kind-aire-lab
      - kubectl create namespace aire-lab --context kind-aire-lab --dry-run=client -o yaml | kubectl apply -f - --context kind-aire-lab
      - kubectl create namespace contextforge --context kind-aire-lab --dry-run=client -o yaml | kubectl apply -f - --context kind-aire-lab

  deploy-day-0:
    desc: |
      Deploy day-0 app-of-apps (agentgateway, kagent, aire-config)
    cmds:
      - kubectl apply -f infra/day-0/app.yaml --context kind-aire-lab

  apply-secrets:
    desc: |
      Apply secrets necessary for proper application functioning
      Auth is centralized in AgentGateway - only it needs the API key
    cmds:
      - |
        kubectl apply -f- <<EOF
        apiVersion: v1
        kind: Secret
        metadata:
          name: gemini-secret
          namespace: agentgateway-system
        type: Opaque
        stringData:
          Authorization: $GEMINI_API_KEY
        EOF

  # ADK Agent Tasks (legacy aliases - use 'task agent:*' instead)
  build-adk-agent:
    desc: |
      Build Docker image for ADK Root Agent (use 'task agent:build')
    cmds:
      - task: agent:build

  push-adk-agent:
    desc: |
      Push ADK Root Agent image to Docker Hub (use 'task agent:push')
    cmds:
      - task: agent:push

  test-adk-agent:
    desc: |
      Run unit tests for ADK Root Agent (use 'task agent:test')
    cmds:
      - task: agent:test

  lint-adk-agent:
    desc: |
      Run linting and type checking for ADK Root Agent (use 'task agent:check-all')
    cmds:
      - task: agent:lint
      - task: agent:type-check

  # Context Forge Tasks
  contextforge-ui:
    desc: |
      Port-forward to Context Forge Admin UI
    cmd: kubectl port-forward -n contextforge svc/contextforge-mcp-context-forge 4444:80 --context kind-aire-lab

  contextforge-token:
    desc: |
      Generate JWT token for Context Forge API access
    cmd: |
      echo "Generating token for admin@aire-lab.local (valid for 1 week)..."
      kubectl exec -n contextforge deployment/contextforge-mcp-context-forge --context kind-aire-lab -- \
        python3 -m mcpgateway.utils.create_jwt_token \
        --username admin@aire-lab.local \
        --exp 10080 \
        --secret my-test-key-but-now-longer-than-32-bytes-for-aire-lab

  contextforge-logs:
    desc: |
      Tail Context Forge logs
    cmd: kubectl logs -n contextforge -l app.kubernetes.io/name=mcp-context-forge -f --context kind-aire-lab

  contextforge-status:
    desc: |
      Check Context Forge deployment status
    cmds:
      - echo "=== Pods ==="
      - kubectl get pods -n contextforge --context kind-aire-lab
      - echo ""
      - echo "=== Services ==="
      - kubectl get svc -n contextforge --context kind-aire-lab
      - echo ""
      - echo "=== HPA ==="
      - kubectl get hpa -n contextforge --context kind-aire-lab
      - echo ""
      - echo "=== PVC ==="
      - kubectl get pvc -n contextforge --context kind-aire-lab